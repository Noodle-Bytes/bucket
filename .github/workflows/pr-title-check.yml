#
# Enforces release-prefix titles ([Patch]/[Minor]/[Major]/[None]), which
# drive the tag-derived release flow. See .github/RELEASE_AUTOMATION.md.

name: PR Title Check

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-title-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          case "$PR_TITLE" in
            \[Patch\]*|\[Minor\]*|\[Major\]*|\[None\]*)
              echo "PR title prefix is valid."
              ;;
            *)
              echo "::error title=Invalid PR title prefix::PR title must start with one of: [Patch], [Minor], [Major], [None]"
              echo "Invalid PR title: '$PR_TITLE'"
              echo ""
              echo "How to fix:"
              echo "1. Edit the PR title in GitHub."
              echo "2. Add one of the required prefixes followed by a short description."
              echo ""
              echo "Prefix meanings (versions are derived from git tags on merge):"
              echo "[Patch] Backward-compatible bug fix or small correction (tags next patch release)."
              echo "[Minor] Backward-compatible feature/improvement (tags next minor release)."
              echo "[Major] Breaking change (tags next major release)."
              echo "[None] No release-impacting change (no tag, no release)."
              echo ""
              echo "Examples:"
              echo "[Patch] fix crash when loading archive"
              echo "[Minor] add CSV import filters"
              echo "[Major] remove legacy JSON schema"
              echo "[None] docs cleanup for coverage guide"
              exit 1
              ;;
          esac
