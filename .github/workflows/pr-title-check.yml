name: PR Title Check

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request_review:
    branches: [main]
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-title-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          case "$PR_TITLE" in
            \[Patch\]*|\[Minor\]*|\[Major\]*|\[None\]*|\[Force\]*)
              echo "PR title prefix is valid."
              ;;
            *)
              echo "::error title=Invalid PR title prefix::PR title must start with one of: [Patch], [Minor], [Major], [None], [Force]"
              echo "Invalid PR title: '$PR_TITLE'"
              echo ""
              echo "How to fix:"
              echo "1. Edit the PR title in GitHub."
              echo "2. Add one of the required prefixes followed by a short description."
              echo ""
              echo "Prefix meanings:"
              echo "[Patch] Backward-compatible bug fix or small correction (bump patch; create tag/release)."
              echo "[Minor] Backward-compatible feature/improvement (bump minor; create tag/release)."
              echo "[Major] Breaking change (bump major; create tag/release)."
              echo "[None] No release-impacting change (no version bump, no tag, no release)."
              echo "[Force] Manual release mode (no auto bump; requires version change; allow version-file edits; create tag/release)."
              echo ""
              echo "Examples:"
              echo "[Patch] fix crash when loading archive"
              echo "[Minor] add CSV import filters"
              echo "[Major] remove legacy JSON schema"
              echo "[None] docs cleanup for coverage guide"
              echo "[Force] release v2.3.0 with manual version update"
              exit 1
              ;;
          esac

      - name: Block manual version changes in PRs
        if: ${{ !startsWith(github.event.pull_request.title, '[Force]') }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.sha;
            const headRef = pr.head.sha;
            const baseOwner = pr.base.repo.owner.login;
            const baseRepo = pr.base.repo.name;
            const headOwner = pr.head.repo.owner.login;
            const headRepo = pr.head.repo.name;

            async function readTextFile(owner, repo, path, ref) {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref,
                });
                if (Array.isArray(response.data)) {
                  throw new Error(`${path} is a directory, expected a file`);
                }
                return Buffer.from(response.data.content, response.data.encoding).toString("utf8");
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            function getPyprojectVersion(text) {
              const lines = text.split(/\r?\n/);
              let inProjectSection = false;
              for (const line of lines) {
                const section = line.match(/^\s*\[([^\]]+)\]\s*$/);
                if (section) {
                  inProjectSection = section[1] === "project";
                  continue;
                }
                if (!inProjectSection) {
                  continue;
                }
                const version = line.match(/^\s*version\s*=\s*"([^"]+)"\s*$/);
                if (version) {
                  return version[1];
                }
              }
              throw new Error("Could not find [project].version in pyproject.toml");
            }

            function getPackageVersion(text, path) {
              const parsed = JSON.parse(text);
              if (typeof parsed.version !== "string") {
                throw new Error(`Missing string \"version\" in ${path}`);
              }
              return parsed.version;
            }

            const files = [
              { path: "pyproject.toml", parser: getPyprojectVersion },
              { path: "viewer/package.json", parser: getPackageVersion },
              { path: "electron/package.json", parser: getPackageVersion },
            ];

            const changedVersions = [];
            const missingRequiredFiles = [];

            for (const file of files) {
              const baseText = await readTextFile(baseOwner, baseRepo, file.path, baseRef);
              const headText = await readTextFile(headOwner, headRepo, file.path, headRef);

              if (baseText === null || headText === null) {
                const missingSide = baseText === null ? "base" : "head";
                missingRequiredFiles.push(`${file.path}: missing in ${missingSide} ref`);
                continue;
              }

              const baseVersion = file.parser(baseText, file.path);
              const headVersion = file.parser(headText, file.path);

              if (baseVersion !== headVersion) {
                changedVersions.push(`${file.path}: ${baseVersion} -> ${headVersion}`);
              }
            }

            if (missingRequiredFiles.length > 0) {
              core.setFailed(
                [
                  "Required version files are missing in this PR comparison.",
                  "",
                  "What to do:",
                  "1. Ensure pyproject.toml, viewer/package.json, and electron/package.json all exist.",
                  "2. Restore any deleted/missing required file before merging.",
                  "",
                  "Missing required files:",
                  ...missingRequiredFiles.map((line) => `- ${line}`),
                ].join("\n"),
              );
              return;
            }

            if (changedVersions.length > 0) {
              core.setFailed(
                [
                  "Do not edit version numbers in PRs.",
                  "Versioning is handled automatically when PRs merge to main using the PR title prefix.",
                  "",
                  "What to do:",
                  "1. Revert version field edits in pyproject.toml, viewer/package.json, and electron/package.json.",
                  "2. Keep your PR title prefix as [Patch]/[Minor]/[Major]/[None] for automated versioning, or use [Force] for manual versioning + release.",
                  "",
                  "Detected manual version changes:",
                  ...changedVersions.map((line) => `- ${line}`),
                ].join("\n"),
              );
            } else {
              core.info("No manual version changes detected in tracked version files.");
            }

      - name: Force mode requires version-only changes in tracked files
        if: ${{ startsWith(github.event.pull_request.title, '[Force]') }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.sha;
            const headRef = pr.head.sha;
            const baseOwner = pr.base.repo.owner.login;
            const baseRepo = pr.base.repo.name;
            const headOwner = pr.head.repo.owner.login;
            const headRepo = pr.head.repo.name;

            async function readTextFile(owner, repo, path, ref) {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref,
                });
                if (Array.isArray(response.data)) {
                  throw new Error(`${path} is a directory, expected a file`);
                }
                return Buffer.from(response.data.content, response.data.encoding).toString("utf8");
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            function getPyprojectVersion(text) {
              const lines = text.split(/\r?\n/);
              let inProjectSection = false;
              for (const line of lines) {
                const section = line.match(/^\s*\[([^\]]+)\]\s*$/);
                if (section) {
                  inProjectSection = section[1] === "project";
                  continue;
                }
                if (!inProjectSection) {
                  continue;
                }
                const version = line.match(/^\s*version\s*=\s*"([^"]+)"\s*$/);
                if (version) {
                  return version[1];
                }
              }
              throw new Error("Could not find [project].version in pyproject.toml");
            }

            function getPackageVersion(text, path) {
              const parsed = JSON.parse(text);
              if (typeof parsed.version !== "string") {
                throw new Error(`Missing string \"version\" in ${path}`);
              }
              return parsed.version;
            }

            function normalizePyprojectVersion(text) {
              const lines = text.split(/\r?\n/);
              let inProjectSection = false;
              let replaced = false;
              const normalized = [];

              for (const line of lines) {
                const section = line.match(/^\s*\[([^\]]+)\]\s*$/);
                if (section) {
                  inProjectSection = section[1] === "project";
                  normalized.push(line);
                  continue;
                }

                if (inProjectSection) {
                  const versionMatch = line.match(/^(\s*version\s*=\s*)"([^"]+)"(\s*)$/);
                  if (versionMatch) {
                    normalized.push(`${versionMatch[1]}"__VERSION__"${versionMatch[3]}`);
                    replaced = true;
                    continue;
                  }
                }

                normalized.push(line);
              }

              if (!replaced) {
                throw new Error("Could not normalize [project].version in pyproject.toml");
              }

              return normalized.join("\n");
            }

            function normalizePackageVersion(text, path) {
              const parsed = JSON.parse(text);
              if (typeof parsed.version !== "string") {
                throw new Error(`Missing string \"version\" in ${path}`);
              }
              parsed.version = "__VERSION__";
              return JSON.stringify(parsed);
            }

            const files = [
              { path: "pyproject.toml", parser: getPyprojectVersion, normalizer: normalizePyprojectVersion },
              { path: "viewer/package.json", parser: getPackageVersion, normalizer: normalizePackageVersion },
              { path: "electron/package.json", parser: getPackageVersion, normalizer: normalizePackageVersion },
            ];
            const allowedPaths = new Set(files.map((file) => file.path));
            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedPaths = changedFiles.map((file) => file.filename);
            const disallowedPaths = changedPaths.filter((path) => !allowedPaths.has(path));
            if (disallowedPaths.length > 0) {
              core.setFailed(
                [
                  "[Force] PRs may only modify tracked version files.",
                  "",
                  "Allowed files:",
                  ...files.map((file) => `- ${file.path}`),
                  "",
                  "Disallowed changed files:",
                  ...disallowedPaths.map((path) => `- ${path}`),
                ].join("\n"),
              );
              return;
            }

            const missingChangedPaths = files
              .map((file) => file.path)
              .filter((path) => !changedPaths.includes(path));
            if (missingChangedPaths.length > 0) {
              core.setFailed(
                [
                  "[Force] PRs must update version values in all tracked version files.",
                  "",
                  "Files missing from this PR diff:",
                  ...missingChangedPaths.map((path) => `- ${path}`),
                ].join("\n"),
              );
              return;
            }

            const headVersions = {};
            const changedVersions = [];
            const changedVersionPaths = new Set();
            const missingRequiredFiles = [];
            const nonVersionEdits = [];

            for (const file of files) {
              const baseText = await readTextFile(baseOwner, baseRepo, file.path, baseRef);
              const headText = await readTextFile(headOwner, headRepo, file.path, headRef);

              if (baseText === null || headText === null) {
                const missingSide = baseText === null ? "base" : "head";
                missingRequiredFiles.push(`${file.path}: missing in ${missingSide} ref`);
                continue;
              }

              const baseVersion = file.parser(baseText, file.path);
              const headVersion = file.parser(headText, file.path);
              headVersions[file.path] = headVersion;

              const baseNormalized = file.normalizer(baseText, file.path);
              const headNormalized = file.normalizer(headText, file.path);
              if (baseNormalized !== headNormalized) {
                nonVersionEdits.push(file.path);
              }

              if (baseVersion !== headVersion) {
                changedVersions.push(`${file.path}: ${baseVersion} -> ${headVersion}`);
                changedVersionPaths.add(file.path);
              }
            }

            if (missingRequiredFiles.length > 0) {
              core.setFailed(
                [
                  "[Force] requires all version files to exist in both base and head refs.",
                  "",
                  "What to do:",
                  "1. Ensure pyproject.toml, viewer/package.json, and electron/package.json all exist.",
                  "2. Restore any missing required file before merging.",
                  "",
                  "Missing required files:",
                  ...missingRequiredFiles.map((line) => `- ${line}`),
                ].join("\n"),
              );
              return;
            }

            if (nonVersionEdits.length > 0) {
              core.setFailed(
                [
                  "[Force] PRs may only change version fields.",
                  "Detected non-version edits in tracked version files.",
                  "",
                  "Files with non-version edits:",
                  ...nonVersionEdits.map((path) => `- ${path}`),
                  "",
                  "What to do:",
                  "1. Revert any edits other than the version value.",
                  "2. Keep only version updates in pyproject.toml, viewer/package.json, and electron/package.json.",
                ].join("\n"),
              );
              return;
            }

            const unchangedVersionFiles = files
              .map((file) => file.path)
              .filter((path) => !changedVersionPaths.has(path));
            if (unchangedVersionFiles.length > 0) {
              core.setFailed(
                [
                  "[Force] requires a version bump in all tracked version files.",
                  "",
                  "Files where version did not change:",
                  ...unchangedVersionFiles.map((path) => `- ${path}`),
                  "",
                  "What to do:",
                  "1. Update version in pyproject.toml, viewer/package.json, and electron/package.json.",
                  "2. Keep all three version values aligned to the same X.Y.Z.",
                ].join("\n"),
              );
              return;
            }

            const uniqueHeadVersions = [...new Set(Object.values(headVersions))];
            if (uniqueHeadVersions.length !== 1) {
              core.setFailed(
                [
                  "[Force] requires synchronized version values.",
                  "Tracked version files do not all match after your changes.",
                  "",
                  "Current head versions:",
                  ...Object.entries(headVersions).map(([path, version]) => `- ${path}: ${version}`),
                  "",
                  "What to do:",
                  "1. Set pyproject.toml, viewer/package.json, and electron/package.json to the same version.",
                ].join("\n"),
              );
              return;
            }

            core.info("[Force] version-only changes validated and version files are synchronized.");

      - name: Restrict bot approvals to action-generated force PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const allowedApprover = "noodle-bucket-bot";
            const isForce = pr.title.startsWith("[Force]");
            const isActionGeneratedForce =
              isForce &&
              pr.head.ref === "ci/version-bump-main" &&
              pr.user.login === "github-actions[bot]";

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestStateByUser = new Map();
            for (const review of reviews) {
              latestStateByUser.set(review.user.login, review.state);
            }

            const approvedUsers = [...latestStateByUser.entries()]
              .filter(([, state]) => state === "APPROVED")
              .map(([login]) => login);
            const botApproved = approvedUsers.includes(allowedApprover);

            if (botApproved && !isActionGeneratedForce) {
              core.setFailed(
                [
                  `${allowedApprover} may only approve action-generated [Force] PRs.`,
                  "",
                  "Detected an approval from this bot on a disallowed PR.",
                  "What to do:",
                  "1. Dismiss the bot approval review.",
                  "2. Use a human reviewer for this PR.",
                ].join("\n"),
              );
              return;
            }

            if (isActionGeneratedForce) {
              const unauthorizedApprovers = approvedUsers.filter(
                (login) => login !== allowedApprover,
              );
              if (unauthorizedApprovers.length > 0) {
                core.setFailed(
                  [
                    "Action-generated [Force] PRs may only be approved by noodle-bucket-bot.",
                    "",
                    "Unauthorized approving reviewers:",
                    ...unauthorizedApprovers.map((login) => `- ${login}`),
                    "",
                    "What to do:",
                    "1. Dismiss non-bot approvals on this PR.",
                    "2. Keep only noodle-bucket-bot approval.",
                  ].join("\n"),
                );
                return;
              }

              if (!botApproved) {
                core.setFailed(
                  [
                    "Action-generated [Force] PR is waiting for noodle-bucket-bot approval.",
                    "This check will pass automatically once the bot review is submitted.",
                  ].join("\n"),
                );
                return;
              }

              core.info("Action-generated [Force] PR approval policy satisfied.");
              return;
            }

            core.info("Bot approval policy satisfied for this PR.");
