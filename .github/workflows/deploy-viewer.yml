name: Deploy Viewer to GitHub Pages

on:
  # Deploy when a release tag is created (by the Tag Release On Merge
  # workflow, using a noodle-bucket-releases App token so this trigger
  # fires), not on every commit to main.
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the viewer's git-describe version fallback works
          # on workflow_dispatch runs (tag pushes set BUCKET_VERSION directly).
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: viewer

      - name: Build viewer
        run: npm run build
        working-directory: viewer
        env:
          GITHUB_PAGES: "true"
          # Exact version from the pushed tag; empty on workflow_dispatch,
          # where the resolver falls back to git describe.
          BUCKET_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs into viewer site
        run: mkdocs build -d viewer/dist/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: viewer/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
