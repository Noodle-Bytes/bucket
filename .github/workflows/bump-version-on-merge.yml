name: Bump Version On Merge

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Derive bump type from PR title
        id: pr_meta
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          case "$PR_TITLE" in
            \[Patch\]*)
              echo "bump=patch" >> "$GITHUB_OUTPUT"
              ;;
            \[Minor\]*)
              echo "bump=minor" >> "$GITHUB_OUTPUT"
              ;;
            \[Major\]*)
              echo "bump=major" >> "$GITHUB_OUTPUT"
              ;;
            \[None\]*)
              echo "bump=none" >> "$GITHUB_OUTPUT"
              ;;
            \[Force\]*)
              echo "bump=force" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported PR title prefix: '$PR_TITLE'"
              echo "Expected one of: [Patch], [Minor], [Major], [None], [Force]"
              exit 1
              ;;
          esac

      - name: No version bump needed
        if: steps.pr_meta.outputs.bump == 'none'
        run: echo "PR title starts with [None]. Skipping version bump, tag, and release."

      - name: Force mode notice
        if: steps.pr_meta.outputs.bump == 'force'
        run: echo "PR title starts with [Force]. Skipping auto-bump and using merged commit version for tag/release."

      # For automatic patch/minor/major bumps, create or update a release PR
      # instead of pushing directly to main. This preserves branch protection
      # and required status checks.
      - name: Checkout main for automated bump
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version files
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        run: python scripts/bump_version.py --bump "${{ steps.pr_meta.outputs.bump }}"

      - name: Read bumped version from pyproject.toml
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        id: bumped_version
        run: |
          set -euo pipefail
          VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("pyproject.toml").read_text(encoding="utf-8")
          section = re.search(r"(?ms)^\[project\]\r?\n(?P<body>.*?)(?=^\[|\Z)", text)
          if not section:
              raise SystemExit("Missing [project] section in pyproject.toml")

          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', section.group("body"))
          if not match:
              raise SystemExit("Missing [project].version in pyproject.toml")

          print(match.group(1))
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${VERSION}"

      - name: Require VERSION_BUMP_TOKEN
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERSION_BUMP_TOKEN:-}" ]; then
            echo "::error title=Missing VERSION_BUMP_TOKEN::Set repository secret VERSION_BUMP_TOKEN to a PAT from noodle-bucket-bot (repo scope for classic PAT, or fine-grained Contents: Read and write + Pull requests: Read and write)."
            exit 1
          fi

      - name: Reset legacy force bump PR author
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_number="$(gh pr list --state open --base main --head ci/version-bump-main --json number --jq '.[0].number // ""')"
          if [ -z "$existing_number" ]; then
            echo "No existing open bump PR on ci/version-bump-main."
            exit 0
          fi

          existing_author="$(gh pr view "$existing_number" --json author --jq .author.login)"
          existing_title="$(gh pr view "$existing_number" --json title --jq .title)"

          if [[ "$existing_title" != \[Force\]* ]]; then
            echo "::error title=Unexpected PR on ci/version-bump-main::Open PR #${existing_number} does not use a [Force] title: '${existing_title}'."
            echo "Resolve the conflicting PR on ci/version-bump-main and re-run this workflow."
            exit 1
          fi

          if [ "$existing_author" = "noodle-bucket-bot" ]; then
            echo "Existing bump PR #${existing_number} already authored by noodle-bucket-bot."
            exit 0
          fi

          echo "Closing incompatible bump PR #${existing_number} authored by ${existing_author} so it can be recreated by noodle-bucket-bot."
          gh pr close "$existing_number" \
            --delete-branch \
            --comment "Resetting this PR so it is recreated by noodle-bucket-bot for automated required-review approval flow."

      - name: Create or update force release PR
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        id: bump_pr
        # v8.1.1 (2026-04-10)
        # refs/tags/v8.1.1 -> 5f6978faf089d4d20b00c7766989d076bb2fc7f1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          # Use VERSION_BUMP_TOKEN so pull_request workflows run on the generated PR.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          base: main
          branch: ci/version-bump-main
          delete-branch: true
          add-paths: |
            pyproject.toml
            electron/package.json
            viewer/package.json
          commit-message: "chore: bump version (${{ steps.pr_meta.outputs.bump }})"
          title: "[Force] release v${{ steps.bumped_version.outputs.version }}"
          body: |
            Auto-generated version bump for a merged `${{ steps.pr_meta.outputs.bump }}` PR.

            Source PR:
            - #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            This PR intentionally uses `[Force]` so manual version-file changes are allowed by repository checks.

      - name: Approve bump PR as GitHub Actions
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump) && steps.bump_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.bump_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail

          pr_state="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
          if [ "$pr_state" != "OPEN" ]; then
            echo "PR #${PR_NUMBER} is ${pr_state}. Skipping automated approval."
            exit 0
          fi

          reviewer_login="$(gh api user --jq .login)"
          author_login="$(gh pr view "$PR_NUMBER" --json author --jq .author.login)"

          if [ "$reviewer_login" = "$author_login" ]; then
            echo "::error title=Invalid approval actor setup::Approval actor ${reviewer_login} matches PR author ${author_login}. Required-review rules disallow self-approval."
            echo "Use VERSION_BUMP_TOKEN for PR creation and GITHUB_TOKEN for approval."
            exit 1
          fi

          existing_approvals="$(gh pr view "$PR_NUMBER" --json reviews --jq "[.reviews[] | select(.author.login == \"$reviewer_login\" and .state == \"APPROVED\")] | length")"
          if [ "$existing_approvals" -gt 0 ]; then
            echo "PR #${PR_NUMBER} already has an approval from ${reviewer_login}."
            exit 0
          fi

          gh pr review "$PR_NUMBER" \
            --approve \
            --body "Automated approval from GitHub Actions for generated [Force] version bump PR."
          echo "Approved bump PR #${PR_NUMBER} as ${reviewer_login}."

      - name: Merge bump PR when checks are ready
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump) && steps.bump_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
          PR_NUMBER: ${{ steps.bump_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          max_attempts=80
          sleep_seconds=15
          attempt=0

          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            echo "Attempt ${attempt}/${max_attempts}: merging bump PR #${PR_NUMBER}"

            pr_state="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
            if [ "$pr_state" != "OPEN" ]; then
              echo "PR #${PR_NUMBER} is already ${pr_state}. Nothing to merge."
              exit 0
            fi

            if gh pr merge "$PR_NUMBER" --squash --delete-branch; then
              echo "Merged bump PR #${PR_NUMBER}."
              exit 0
            fi

            echo "PR #${PR_NUMBER} is not mergeable yet. Waiting ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          echo "::error title=Timed out merging bump PR::PR #${PR_NUMBER} did not become mergeable within $((max_attempts * sleep_seconds / 60)) minutes."
          exit 1

      - name: Report bump PR
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        run: |
          if [ -n "${{ steps.bump_pr.outputs.pull-request-url }}" ]; then
            echo "Created/updated bump PR: ${{ steps.bump_pr.outputs.pull-request-url }}"
          else
            echo "No version changes detected; no bump PR created."
          fi

      - name: Resolve release target SHA for force mode
        if: steps.pr_meta.outputs.bump == 'force'
        id: release_target_force
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          echo "sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Release target SHA: ${MERGE_SHA}"

      - name: Derive release tag from pyproject version
        if: steps.pr_meta.outputs.bump == 'force'
        id: version_meta
        env:
          TARGET_SHA: ${{ steps.release_target_force.outputs.sha }}
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = process.env.TARGET_SHA;
            const { owner, repo } = context.repo;

            if (!targetSha) {
              core.setFailed("Missing release target SHA.");
              return;
            }

            const response = await github.rest.repos.getContent({
              owner,
              repo,
              path: "pyproject.toml",
              ref: targetSha,
            });

            if (Array.isArray(response.data)) {
              core.setFailed("pyproject.toml resolved to a directory.");
              return;
            }

            const text = Buffer.from(
              response.data.content,
              response.data.encoding,
            ).toString("utf8");

            const lines = text.split(/\r?\n/);
            let inProjectSection = false;
            let version = null;

            for (const line of lines) {
              const section = line.match(/^\s*\[([^\]]+)\]\s*$/);
              if (section) {
                inProjectSection = section[1] === "project";
                continue;
              }
              if (!inProjectSection) {
                continue;
              }
              const match = line.match(/^\s*version\s*=\s*"([^"]+)"\s*$/);
              if (match) {
                version = match[1];
                break;
              }
            }

            if (!version) {
              core.setFailed(
                `Could not find [project].version in pyproject.toml at ${targetSha}.`,
              );
              return;
            }

            const tag = `v${version}`;
            core.setOutput("version", version);
            core.setOutput("tag", tag);
            core.info(`Release tag will be ${tag}`);

      - name: Create GitHub release with generated notes
        if: steps.pr_meta.outputs.bump == 'force'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version_meta.outputs.tag }}
          TARGET_SHA: ${{ steps.release_target_force.outputs.sha }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Skipping create."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
