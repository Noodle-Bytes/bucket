#
# Operator guide (release pipeline overview, stay-blocked recovery policy,
# and how to manually clear a stuck release-pipeline-gate):
#   .github/RELEASE_AUTOMATION.md

name: Bump Version On Merge

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

# Source-PR runs (patch/minor/major/none) and the release-tag run triggered by
# the bump PR's own merge are handled in separate concurrency groups so a
# release-tag run can never cancel a queued source-PR run, which would silently
# skip a release for that source PR.
concurrency:
  group: >-
    version-bump-main-${{
      (github.event.pull_request.head.ref == 'ci/version-bump-main' && startsWith(github.event.pull_request.title, '[Release]'))
      && 'release'
      || 'source'
    }}
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Derive bump type from PR title
        id: pr_meta
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          case "$PR_TITLE" in
            \[Patch\]*)
              echo "bump=patch" >> "$GITHUB_OUTPUT"
              ;;
            \[Minor\]*)
              echo "bump=minor" >> "$GITHUB_OUTPUT"
              ;;
            \[Major\]*)
              echo "bump=major" >> "$GITHUB_OUTPUT"
              ;;
            \[None\]*)
              echo "bump=none" >> "$GITHUB_OUTPUT"
              ;;
            \[Release\]*)
              echo "bump=release" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported PR title prefix: '$PR_TITLE'"
              echo "Expected one of: [Patch], [Minor], [Major], [None], [Release]"
              exit 1
              ;;
          esac

      - name: No version bump needed
        if: steps.pr_meta.outputs.bump == 'none'
        run: echo "PR title starts with [None]. Skipping version bump, tag, and release."

      - name: Release mode notice
        if: steps.pr_meta.outputs.bump == 'release'
        run: echo "PR title starts with [Release]. Skipping auto-bump and using merged commit version for tag/release."

      # Lock the release pipeline by flipping the gate to 'pending' on every
      # other open source PR before doing any other work. This narrows the race
      # window where another source PR could be merged with a stale 'success'
      # gate while this workflow is still spinning up.
      - name: Set release pipeline gate to pending on open source PRs
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/github-script@v9
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const mergedPr = Number(process.env.MERGED_PR_NUMBER);
            const validPrefixes = ["[Patch]", "[Minor]", "[Major]"];

            const sourcePRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            let updated = 0;
            for (const pr of sourcePRs) {
              if (pr.number === mergedPr) continue;
              if (pr.head.ref === "ci/version-bump-main") continue;
              if (!validPrefixes.some((p) => pr.title.startsWith(p))) continue;

              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state: "pending",
                context: "release-pipeline-gate",
                description: `Wait for release PR for source PR #${mergedPr} to land`,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              core.info(`Set release-pipeline-gate=pending on PR #${pr.number} (${pr.title})`);
              updated += 1;
            }
            core.info(`Updated ${updated} open source PR(s) to pending.`);

      # Strict release-per-PR: bail loudly if a release PR is already open.
      # The release-pipeline-gate required check on source PRs is supposed to
      # block this from happening; if we get here, the gate failed. Aborting
      # without overwriting the in-flight bump prevents a silent version
      # downgrade or a lost release for either the in-flight or current PR.
      # Per the chosen "stay-blocked" recovery policy: gates remain 'pending'
      # so no further releases land until a human investigates and either
      # re-runs this workflow or manually clears the gate.
      - name: Defensive check - fail if a release PR is already open
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        env:
          GH_TOKEN: ${{ github.token }}
          # GH_REPO is required because this step runs before actions/checkout,
          # so `gh` has no local .git to detect the repository from.
          GH_REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # Restrict the head match to the BASE repo to avoid false positives
          # from a fork PR that happens to use the same branch name.
          existing="$(gh pr list --state open --base main \
            --json number,title,url,author,headRepositoryOwner,headRefName \
            --jq "[.[] | select(.headRefName == \"ci/version-bump-main\" and .headRepositoryOwner.login == \"${REPO_OWNER}\")] | .[0] // empty")"
          if [ -z "$existing" ]; then
            echo "No open release PR on ${REPO_OWNER}:ci/version-bump-main; safe to proceed."
            exit 0
          fi

          existing_number="$(echo "$existing" | jq -r .number)"
          existing_title="$(echo "$existing" | jq -r .title)"
          existing_url="$(echo "$existing" | jq -r .url)"
          existing_author="$(echo "$existing" | jq -r .author.login)"

          {
            echo "::error title=Release pipeline race detected::An open release PR (#${existing_number}) is in flight and the release-pipeline-gate required status check should have prevented this source PR from merging."
            echo ""
            echo "Existing release PR:"
            echo "  number: ${existing_number}"
            echo "  title:  ${existing_title}"
            echo "  author: ${existing_author}"
            echo "  url:    ${existing_url}"
            echo ""
            echo "What to do:"
            echo "1. Investigate why the release-pipeline-gate let this source PR (#${{ github.event.pull_request.number }}) merge while the release PR was still open."
            echo "2. Once the in-flight release PR has merged, manually create a [Release] PR for this source PR's bump (see scripts/bump_version.py) so the release for this PR is not lost."
            echo "3. Restore source PR gates by re-running this workflow on a successful source PR merge, or by posting a 'success' commit status with context 'release-pipeline-gate' on each open source PR's head SHA."
          } >&2
          exit 1

      # For automatic patch/minor/major bumps, create or update a release PR
      # instead of pushing directly to main. This preserves branch protection
      # and required status checks.
      - name: Checkout main for automated bump
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version files
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        run: python scripts/bump_version.py --bump "${{ steps.pr_meta.outputs.bump }}"

      - name: Read bumped version from pyproject.toml
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        id: bumped_version
        run: |
          set -euo pipefail
          VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          text = Path("pyproject.toml").read_text(encoding="utf-8")
          section = re.search(r"(?ms)^\[project\]\r?\n(?P<body>.*?)(?=^\[|\Z)", text)
          if not section:
              raise SystemExit("Missing [project] section in pyproject.toml")

          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', section.group("body"))
          if not match:
              raise SystemExit("Missing [project].version in pyproject.toml")

          print(match.group(1))
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${VERSION}"

      - name: Validate VERSION_BUMP_TOKEN
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          set -euo pipefail
          expected_login="noodle-bucket-bot"

          if [ -z "${VERSION_BUMP_TOKEN:-}" ]; then
            echo "::error title=Missing VERSION_BUMP_TOKEN::Set repository secret VERSION_BUMP_TOKEN to a PAT from ${expected_login} (repo scope for classic PAT, or fine-grained Contents: Read and write + Pull requests: Read and write)."
            exit 1
          fi

          # Validate the token is not expired/revoked and belongs to the right account.
          # An expired PAT is non-empty but would silently fail later steps.
          if ! login="$(GH_TOKEN="${VERSION_BUMP_TOKEN}" gh api user --jq .login 2>&1)"; then
            echo "::error title=Invalid VERSION_BUMP_TOKEN::Token authentication failed. It may be expired or revoked. Renew the PAT for ${expected_login} and update the VERSION_BUMP_TOKEN secret."
            echo "gh api user output: ${login}"
            exit 1
          fi

          if [ "$login" != "$expected_login" ]; then
            echo "::error title=Wrong VERSION_BUMP_TOKEN owner::Token belongs to '${login}', expected '${expected_login}'. Update VERSION_BUMP_TOKEN to a PAT from ${expected_login}."
            exit 1
          fi

          echo "VERSION_BUMP_TOKEN is valid (authenticated as ${login})."

      - name: Create or update release PR
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        id: bump_pr
        # v8.1.1 (2026-04-10)
        # refs/tags/v8.1.1 -> 5f6978faf089d4d20b00c7766989d076bb2fc7f1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          # Use VERSION_BUMP_TOKEN so pull_request workflows run on the generated PR.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          base: main
          branch: ci/version-bump-main
          delete-branch: true
          add-paths: |
            pyproject.toml
            electron/package.json
            viewer/package.json
          commit-message: "chore: bump version (${{ steps.pr_meta.outputs.bump }})"
          title: "[Release] release v${{ steps.bumped_version.outputs.version }}"
          body: |
            Auto-generated version bump for a merged `${{ steps.pr_meta.outputs.bump }}` PR.

            Source PR:
            - #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            This PR uses `[Release]` so manual version-file changes are allowed by repository checks.

      # Mint a short-lived (1 hour) installation token for the bucket-release-approver GitHub App.
      # The App is the second identity required to satisfy branch protection's "1 approval"
      # rule on the bot-authored bump PR (noodle-bucket-bot cannot approve its own PR).
      - name: Mint approver app installation token
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump) && steps.bump_pr.outputs.pull-request-number != ''
        id: approver_token
        # actions/create-github-app-token v3.1.1 (2026-04-11)
        # refs/tags/v3.1.1 -> 1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          app-id: ${{ secrets.APPROVER_APP_ID }}
          private-key: ${{ secrets.APPROVER_APP_PRIVATE_KEY }}

      - name: Approve bump PR via approver app
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump) && steps.bump_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.approver_token.outputs.token }}
          PR_NUMBER: ${{ steps.bump_pr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
          APP_SLUG: ${{ steps.approver_token.outputs.app-slug }}
        run: |
          set -euo pipefail
          reviewer_login="${APP_SLUG}[bot]"
          existing="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq "[.[] | select(.user.login == \"$reviewer_login\" and .state == \"APPROVED\")] | length")"
          if [ "$existing" -gt 0 ]; then
            echo "PR #${PR_NUMBER} already approved by $reviewer_login; skipping."
            exit 0
          fi
          echo "Approving PR #${PR_NUMBER} as $reviewer_login..."
          gh api -X POST "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event=APPROVE \
            -f body="Auto-approved by ${reviewer_login} for action-generated [Release] PR."

      # Merge as noodle-bucket-bot (NOT github.token), because GITHUB_TOKEN-driven merges
      # do not trigger downstream pull_request_target events, which would skip the [Release]
      # release/tag step in this same workflow.
      - name: Merge bump PR once checks pass
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump) && steps.bump_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
          PR_NUMBER: ${{ steps.bump_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          max_attempts=40
          sleep_seconds=15
          attempt=0

          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            echo "Attempt ${attempt}/${max_attempts}: trying to merge bump PR #${PR_NUMBER}"

            # `gh pr view` does not expose a boolean `merged` field; use
            # `mergedAt` (a timestamp string when merged, null otherwise)
            # to distinguish a merged PR from a closed-without-merge PR.
            pr_info="$(gh pr view "$PR_NUMBER" --json state,mergedAt)"
            pr_state="$(echo "$pr_info" | jq -r .state)"
            pr_merged_at="$(echo "$pr_info" | jq -r '.mergedAt // ""')"
            if [ "$pr_state" != "OPEN" ]; then
              if [ -n "$pr_merged_at" ]; then
                echo "PR #${PR_NUMBER} was merged externally at ${pr_merged_at}. Continuing."
                exit 0
              fi
              # Closed without merge: stay-blocked policy. Fail loudly so
              # downstream gate-clearing step does not run, leaving open
              # source PRs in 'pending' until a human investigates.
              echo "::error title=Bump PR closed without merging::PR #${PR_NUMBER} is ${pr_state} but was not merged. Release pipeline gates will remain pending until manually cleared."
              exit 1
            fi

            merge_output="$(gh pr merge "$PR_NUMBER" --squash --delete-branch 2>&1)" && {
              echo "Merged bump PR #${PR_NUMBER}."
              exit 0
            } || {
              # Fail immediately on auth errors rather than retrying for 10 minutes
              # with a misleading "not mergeable yet" message.
              if echo "$merge_output" | grep -qiE "401|403|bad credentials|unauthorized|forbidden"; then
                echo "::error title=Authentication failure merging bump PR::VERSION_BUMP_TOKEN authentication failed on gh pr merge. The token may have expired since the validation step. Renew it and update the VERSION_BUMP_TOKEN secret."
                echo "gh pr merge output: ${merge_output}"
                exit 1
              fi
              echo "PR #${PR_NUMBER} not mergeable yet (${merge_output}). Waiting ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            }
          done

          echo "::error title=Timed out merging bump PR::PR #${PR_NUMBER} did not become mergeable within $((max_attempts * sleep_seconds / 60)) minutes."
          exit 1

      # Only on successful merge above. If this workflow fails earlier, gates
      # stay 'pending' on open source PRs so no further releases land until a
      # human investigates (per the chosen "stay-blocked" recovery policy).
      - name: Set release pipeline gate to success on open source PRs
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        uses: actions/github-script@v9
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const mergedPr = Number(process.env.MERGED_PR_NUMBER);
            const validPrefixes = ["[Patch]", "[Minor]", "[Major]"];

            const sourcePRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            let updated = 0;
            for (const pr of sourcePRs) {
              if (pr.number === mergedPr) continue;
              if (pr.head.ref === "ci/version-bump-main") continue;
              if (!validPrefixes.some((p) => pr.title.startsWith(p))) continue;

              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state: "success",
                context: "release-pipeline-gate",
                description: "No active release PR; clear to merge",
              });
              core.info(`Set release-pipeline-gate=success on PR #${pr.number} (${pr.title})`);
              updated += 1;
            }
            core.info(`Cleared release-pipeline-gate on ${updated} open source PR(s).`);

      - name: Report bump PR
        if: contains(fromJSON('["patch","minor","major"]'), steps.pr_meta.outputs.bump)
        run: |
          if [ -n "${{ steps.bump_pr.outputs.pull-request-url }}" ]; then
            echo "Created/updated bump PR: ${{ steps.bump_pr.outputs.pull-request-url }}"
          else
            echo "No version changes detected; no bump PR created."
          fi

      - name: Resolve release target SHA for release mode
        if: steps.pr_meta.outputs.bump == 'release'
        id: release_target_force
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          echo "sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Release target SHA: ${MERGE_SHA}"

      - name: Derive release tag from pyproject version
        if: steps.pr_meta.outputs.bump == 'release'
        id: version_meta
        env:
          TARGET_SHA: ${{ steps.release_target_force.outputs.sha }}
        uses: actions/github-script@v9
        with:
          script: |
            const targetSha = process.env.TARGET_SHA;
            const { owner, repo } = context.repo;

            if (!targetSha) {
              core.setFailed("Missing release target SHA.");
              return;
            }

            const response = await github.rest.repos.getContent({
              owner,
              repo,
              path: "pyproject.toml",
              ref: targetSha,
            });

            if (Array.isArray(response.data)) {
              core.setFailed("pyproject.toml resolved to a directory.");
              return;
            }

            const text = Buffer.from(
              response.data.content,
              response.data.encoding,
            ).toString("utf8");

            const lines = text.split(/\r?\n/);
            let inProjectSection = false;
            let version = null;

            for (const line of lines) {
              const section = line.match(/^\s*\[([^\]]+)\]\s*$/);
              if (section) {
                inProjectSection = section[1] === "project";
                continue;
              }
              if (!inProjectSection) {
                continue;
              }
              const match = line.match(/^\s*version\s*=\s*"([^"]+)"\s*$/);
              if (match) {
                version = match[1];
                break;
              }
            }

            if (!version) {
              core.setFailed(
                `Could not find [project].version in pyproject.toml at ${targetSha}.`,
              );
              return;
            }

            const tag = `v${version}`;
            core.setOutput("version", version);
            core.setOutput("tag", tag);
            core.info(`Release tag will be ${tag}`);

      - name: Create GitHub release with generated notes
        if: steps.pr_meta.outputs.bump == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          # GH_REPO is required because the [Release] code path does not run
          # actions/checkout, so `gh` has no local .git to detect the repo.
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version_meta.outputs.tag }}
          TARGET_SHA: ${{ steps.release_target_force.outputs.sha }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Skipping create."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
